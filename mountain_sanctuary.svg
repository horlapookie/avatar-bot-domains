<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d00"/>
      <stop offset="100%" stop-color="#1a1500"/>
    </linearGradient>
    <radialGradient id="orbGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#886600aa"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="orb" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffffaa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#664400"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Outer glow border -->
  <rect x="8" y="8" width="784" height="484" fill="none"
    stroke="#886600" stroke-width="3" rx="4" filter="url(#glow)" opacity="0.8"/>

  <!-- Inner border -->
  <rect x="16" y="16" width="768" height="468" fill="none"
    stroke="#ffffaa" stroke-width="1" rx="2" opacity="0.3"/>

  <!-- Large orb glow -->
  <circle cx="400" cy="230" r="160" fill="url(#orbGlow)" opacity="0.6"/>

  <!-- Ring decorations -->
  <circle cx="400" cy="230" r="100" fill="none"
    stroke="#ccaa00" stroke-width="1.5" stroke-dasharray="8 4" opacity="0.4"/>
  <circle cx="400" cy="230" r="130" fill="none"
    stroke="#886600" stroke-width="0.8" stroke-dasharray="4 8" opacity="0.3"/>

  <!-- Ray lines -->
  <line x1="465.0" y1="230.0" x2="545.0" y2="230.0" stroke="#886600" stroke-width="1.2" opacity="0.4"/>
  <line x1="456.3" y1="262.5" x2="525.6" y2="302.5" stroke="#886600" stroke-width="1.2" opacity="0.4"/>
  <line x1="432.5" y1="286.3" x2="472.5" y2="355.6" stroke="#886600" stroke-width="1.2" opacity="0.4"/>
  <line x1="400.0" y1="295.0" x2="400.0" y2="375.0" stroke="#886600" stroke-width="1.2" opacity="0.4"/>
  <line x1="367.5" y1="286.3" x2="327.5" y2="355.6" stroke="#886600" stroke-width="1.2" opacity="0.4"/>
  <line x1="343.7" y1="262.5" x2="274.4" y2="302.5" stroke="#886600" stroke-width="1.2" opacity="0.4"/>
  <line x1="335.0" y1="230.0" x2="255.0" y2="230.0" stroke="#886600" stroke-width="1.2" opacity="0.4"/>
  <line x1="343.7" y1="197.5" x2="274.4" y2="157.5" stroke="#886600" stroke-width="1.2" opacity="0.4"/>
  <line x1="367.5" y1="173.7" x2="327.5" y2="104.4" stroke="#886600" stroke-width="1.2" opacity="0.4"/>
  <line x1="400.0" y1="165.0" x2="400.0" y2="85.0" stroke="#886600" stroke-width="1.2" opacity="0.4"/>
  <line x1="432.5" y1="173.7" x2="472.5" y2="104.4" stroke="#886600" stroke-width="1.2" opacity="0.4"/>
  <line x1="456.3" y1="197.5" x2="525.6" y2="157.5" stroke="#886600" stroke-width="1.2" opacity="0.4"/>

  <!-- Central orb -->
  <circle cx="400" cy="230" r="58" fill="url(#orb)" filter="url(#glow)"/>
  <circle cx="388" cy="218" r="16" fill="#ffffaa" opacity="0.35"/>

  <!-- Title -->
  <text x="400" y="56" text-anchor="middle" font-family="Arial Black, sans-serif"
    font-size="30" font-weight="bold" fill="#ffffaa" filter="url(#textGlow)"
    letter-spacing="2">MOUNTAIN GOD'S SANCTUARY</text>

  <!-- Subtitle -->
  <text x="400" y="86" text-anchor="middle" font-family="Arial, sans-serif"
    font-size="16" fill="#ccaa00" opacity="0.9">Stone Fortress Battlefield</text>

  <!-- Bottom panel -->
  <rect x="20" y="382" width="760" height="96" fill="#00000099" rx="4"/>
  <rect x="20" y="382" width="760" height="96" fill="none"
    stroke="#886600" stroke-width="1" rx="4" opacity="0.5"/>

  <!-- Spirit -->
  <text x="42" y="412" font-family="Arial, sans-serif" font-size="14"
    font-weight="bold" fill="#ffffaa">Spirit Guardian:</text>
  <text x="190" y="412" font-family="Arial, sans-serif" font-size="14"
    fill="#ccaa00">⛰️ Mountain Titan</text>

  <!-- Throne -->
  <text x="42" y="438" font-family="Arial, sans-serif" font-size="14"
    font-weight="bold" fill="#ffffaa">Divine Throne:</text>
  <text x="190" y="438" font-family="Arial, sans-serif" font-size="14"
    fill="#ccaa00">🗿👑 Stone Emperor Throne</text>

  <!-- Watermark -->
  <text x="772" y="472" text-anchor="end" font-family="Arial, sans-serif"
    font-size="11" fill="#ffffff33">Avatar WhatsApp RPG — Divine Domain System</text>
</svg>